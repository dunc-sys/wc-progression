name: Refresh progression
on:
  schedule:
    - cron: "0 7 * * *"
  workflow_dispatch: {}
permissions:
  contents: write
jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Compute market-calibrated progression
        env:
          ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}
        run: python3 refresh_progression.py
      - name: Commit if it changed
        run: |
          git config user.name "progression-bot"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add progression.json
          git diff --staged --quiet || git commit -m "Refresh progression"
          git push
